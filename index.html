<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وينه</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#111;
color:#fff;
direction:rtl;
}

header{
background:#1b1b1b;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
color:gold;
}

.search-box{
padding:15px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
cursor:pointer;
}

#stores{
padding:15px;
}

.card{
background:#1e1e1e;
padding:15px;
margin-bottom:12px;
border-radius:18px;
cursor:pointer;
border:1px solid #333;
}

.card h3{
margin:0 0 8px;
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:13px;
margin-top:8px;
}

.open{
background:#143b22;
color:#4ade80;
}

.closed{
background:#3b1414;
color:#f87171;
}
</style>
</head>

<body>

<header>
📍 وينه
</header>

<div class="search-box">
<input
type="text"
id="search"
placeholder="ابحث عن محل..."
>
<button onclick="searchStore()">
بحث
</button>
</div>

<div id="stores"></div>
<script>

const stores = [
{
name:"Star Coffee",
type:"كافيه",
phone:"44001122",
open:true,
distance:"0.5 كم",
map:"https://maps.google.com/?q=25.2854,51.5310"
},
{
name:"برجر الخليج",
type:"مطعم",
phone:"44009911",
open:false,
distance:"1.2 كم",
map:"https://maps.google.com/?q=25.2900,51.5200"
},
{
name:"صيدلية الشفاء",
type:"صيدلية",
phone:"44007755",
open:true,
distance:"0.8 كم",
map:"https://maps.google.com/?q=25.2810,51.5260"
},
{
name:"Tech Store",
type:"إلكترونيات",
phone:"44008866",
open:true,
distance:"2 كم",
map:"https://maps.google.com/?q=25.2700,51.5100"
}
];

function renderStores(data){

const container =
document.getElementById("stores");

container.innerHTML =
data.map(store => `

<div class="card"
onclick="openStore('${store.phone}','${store.map}')">

<h3>${store.name}</h3>

<div>
${store.type}
· 📍 ${store.distance}
</div>

<div class="
badge
${store.open ? "open":"closed"}
">
${store.open ? "🟢 مفتوح":"🔴 مغلق"}
</div>

</div>

`).join("");

}

function searchStore(){

const value =
document
.getElementById("search")
.value
.toLowerCase();

const filtered =
stores.filter(store =>

store.name
.toLowerCase()
.includes(value)

||

store.type
.includes(value)

);

renderStores(filtered);

}

function openStore(phone,map){

const go =
confirm(
"موافق = فتح الخرائط\nإلغاء = اتصال"
);

if(go){

window.open(map,"_blank");

}else{

window.location.href =
`tel:${phone}`;

}

}

renderStores(stores);

</script>

</body>
</html>
