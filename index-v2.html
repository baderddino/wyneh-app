<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>وينه PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Tajawal',sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x: hidden;
}

header{
padding:55px 20px 20px;
background:linear-gradient(180deg,#181818,#0d0d0d);
position:sticky;
top:0;
z-index:99;
border-bottom:1px solid #222;
}

.logo{
font-size:32px;
font-weight:900;
color:#d4af37;
margin-bottom:15px;
}

.location{
font-size:14px;
opacity:.8;
margin-bottom:15px;
}

.searchBox{
display:flex;
gap:10px;
}

.searchBox input{
flex:1;
padding:16px;
border-radius:18px;
border:none;
background:#1b1b1b;
color:white;
font-size:16px;
outline:none;
}

.searchBox button{
background:#d4af37;
border:none;
padding:16px 20px;
border-radius:18px;
font-weight:800;
font-size:15px;
cursor:pointer;
}

.sectionTitle{
padding:20px;
font-size:20px;
font-weight:800;
}

#stores{
padding:0 20px 120px;
}

.card{
background:#171717;
border:1px solid #2b2b2b;
border-radius:28px;
padding:20px;
margin-bottom:16px;
transition:.2s;
}

.card:hover{
transform:scale(1.02);
}

.storeTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.storeName{
font-size:21px;
font-weight:800;
}

.distance{
font-size:14px;
opacity:.7;
}

.badge{
display:inline-block;
padding:8px 15px;
border-radius:999px;
font-size:13px;
font-weight:700;
margin-top:10px;
}

.open{
background:#143b22;
color:#4ade80;
}

.closed{
background:#401515;
color:#f87171;
}

.actions{
display:flex;
gap:10px;
margin-top:18px;
}

.callBtn,
.mapBtn{
flex:1;
padding:15px;
border:none;
border-radius:18px;
font-weight:800;
font-size:15px;
cursor:pointer;
}

.callBtn{
background:#1f1f1f;
color:white;
}

.mapBtn{
background:#d4af37;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  background: #0f0f0f;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 10px 5px 28px;
  z-index: 9999;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.nav-icon {
  font-size: 22px;
}

.nav-label {
  font-size: 11px;
}
</style>
</head>

<body>

<header>

<div class="logo">
📍 وينه PRO
</div>

<div class="location">
الدوحة، قطر
</div>

<div class="searchBox">

<input
id="search"
type="text"
placeholder="ابحث عن كافيه، مطعم، صيدلية..."
>

<button onclick="searchStore()">
بحث
</button>

</div>

</header>
</body>

<div class="sectionTitle">
قريب منك الآن 🔥
</div>

<div id="stores"></div>
<script>

const stores = [

{
name:"Starbucks Doha",
type:"كافيه ☕",
phone:"44001122",
distance:"0.5 كم",
open:true,
map:"https://maps.google.com/?q=25.2854,51.5310"
},

{
name:"Lulu Hypermarket",
type:"بقالة 🛒",
phone:"44007755",
distance:"1.2 كم",
open:true,
map:"https://maps.google.com/?q=25.2910,51.5200"
},

{
name:"صيدلية الشفاء",
type:"صيدلية 💊",
phone:"44008866",
distance:"0.8 كم",
open:false,
map:"https://maps.google.com/?q=25.2800,51.5300"
},

{
name:"برجر الخليج",
type:"مطعم 🍔",
phone:"44006611",
distance:"2 كم",
open:true,
map:"https://maps.google.com/?q=25.2700,51.5100"
}

];

function renderStores(data){

document.getElementById("stores")
.innerHTML = data.map(store => `

<div class="card">

<div class="storeTop">

<div>
<div class="storeName">
${store.name}
</div>

<div class="distance">
${store.type}
· 📍 ${store.distance}
</div>
</div>

<div class="
badge
${store.open ? 'open':'closed'}
">

${store.open
? '🟢 مفتوح'
: '🔴 مغلق'}

</div>

</div>

<div class="actions">

<button
class="callBtn"
onclick="window.location.href='tel:${store.phone}'"
>
📞 اتصال
</button>

<button
class="mapBtn"
onclick="window.open('${store.map}','_blank')"
>
🗺️ خرائط
</button>

</div>

</div>

`).join("");

}

function searchStore(){

const value =
document
.getElementById("search")
.value
.toLowerCase();

const filtered =
stores.filter(store =>

store.name
.toLowerCase()
.includes(value)

||

store.type
.includes(value)

);

renderStores(filtered);

}

renderStores(stores);

</script>

<div class="bottomNav">

<div class="navItem">
🏠<br>
الرئيسية
</div>

<div class="navItem">
🔍<br>
بحث
</div>

<div class="navItem">
❤️<br>
المفضلة
</div>

<div class="navItem">
👤<br>
حسابي
</div>

</div>

</body>
</html>
